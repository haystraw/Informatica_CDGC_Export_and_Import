; CDGC Export & Import configuration
; Priority: command-line args > this file > environment variables > hardcoded defaults
;
; All keys follow the pattern:  cdgc_<script>_<setting>
; The same name works as an env var:  set cdgc_export_pod=dmp-us
; And as a CLI arg:                   --cdgc_export_pod dmp-us

[config]

; ---- Export ----------------------------------------------------------------
; cdgc_export_pod                  = dmp-us
; cdgc_export_username             = shayes_BFSI_Insurance
; cdgc_export_password             = xxx
; Staging temp folder — deleted after the zip is created.
; Supports {timestamp} placeholder (e.g. ./tmp/cdgc_export_{timestamp}).
; Leave commented to use the OS default temp directory.
cdgc_export_temp_dir               = ./cdgc_export_{timestamp}
cdgc_export_download_zips          = true
cdgc_export_enable_connections     = true
cdgc_export_enable_catalog_sources = true
; cdgc_export_filter_connections     =
; cdgc_export_filter_catalog_sources =

; ---- Import ----------------------------------------------------------------
; cdgc_import_pod                  = dmp-us
; cdgc_import_username             = shayes_compass_debug
; cdgc_import_password             = xxx
; cdgc_import_export_zip           = ./export.zip
cdgc_import_prompt_for_zip_file  = true
cdgc_import_enable_connections           = true
cdgc_import_enable_catalog_sources       = true
cdgc_import_ignore_encrypted_changes     = true
; cdgc_import_confirm                    = true
; cdgc_import_filter_connections         =
; cdgc_import_filter_catalog_sources     =
; cdgc_import_runtime_map                = infadomain.mxdomain=mynew_agent; old_runtime_2=mynew_agent_2
; cdgc_import_encrypted_fields             = encrypted_fields.csv

; ---- Delete Connections ----------------------------------------------------
; cdgc_delete_connections_pod      = dmp-us
; cdgc_delete_connections_username = shayes_compass_debug
; cdgc_delete_connections_password = xxx
; cdgc_delete_connections_confirm = true

; ---- Delete Resources ------------------------------------------------------
; cdgc_delete_resources_pod        = dmp-us
; cdgc_delete_resources_username   = shayes_compass_debug
; cdgc_delete_resources_password   = xxx
; cdgc_delete_resources_confirm   = true
